name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes cancel in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The job name is the required-status-check context in
  # .github/rulesets/main.json — renaming this job silently breaks the branch
  # protection requirement. Keep them in sync.
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # CI uses the same Nix flake as local dev, so the Rust toolchain and
      # cargo-deny versions match exactly — a gate that passes locally passes
      # here.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # Swatinem/rust-cache keys its cache off `rustc`/`cargo`, which live in the
      # flake dev shell rather than on the runner's PATH. Expose that bin dir so
      # the cache action can find the toolchain.
      - name: Expose the flake's Rust toolchain on PATH
        run: nix develop --command bash -c 'dirname "$(command -v cargo)" >> "$GITHUB_PATH"'

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting gate
        run: nix develop --command bash -c "cargo fmt --check"

      - name: Clippy (warnings are errors)
        run: nix develop --command bash -c "cargo clippy --all-targets -- -D warnings"

      - name: Tests
        run: nix develop --command bash -c "cargo test"

      - name: Doctests
        run: nix develop --command bash -c "cargo test --doc"

      - name: Dependency policy (licenses, advisories, bans, sources)
        run: nix develop --command bash -c "cargo deny check"
