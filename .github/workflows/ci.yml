name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes cancel in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # `ci` is the required-status-check context in .github/rulesets/main.json —
  # renaming this job silently breaks the branch protection. Keep them in sync.
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Same flake as local dev, so a gate that passes locally passes here.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # Cache the flake dev shell across runs; the cold `nix develop` dominates the job.
      - name: Cache the Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # rust-cache keys off `rustc`/`cargo`, which live in the flake dev shell
      # rather than on the runner PATH — expose that bin dir so it can find them.
      - name: Expose the flake's Rust toolchain on PATH
        run: nix develop --command bash -c 'dirname "$(command -v cargo)" >> "$GITHUB_PATH"'

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting gate
        run: nix develop --command bash -c "cargo fmt --check"

      - name: Clippy (warnings are errors)
        run: nix develop --command bash -c "cargo clippy --all-targets -- -D warnings"

      - name: Tests
        run: nix develop --command bash -c "cargo test"

      - name: Doctests
        run: nix develop --command bash -c "cargo test --doc"

      - name: Dependency policy (licenses, advisories, bans, sources)
        run: nix develop --command bash -c "cargo deny check"
